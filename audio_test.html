<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音频诊断</title>
<style>
  body { font-family: sans-serif; padding: 40px 20px; background: #1a2a4a; color: #fff; }
  h2 { margin-bottom: 20px; }
  button {
    display: block; width: 100%; padding: 20px;
    margin-bottom: 16px; border-radius: 16px; border: none;
    font-size: 1.1rem; cursor: pointer;
  }
  .log { margin-top: 20px; background: rgba(255,255,255,0.1); border-radius: 12px; padding: 16px; font-size: 0.85rem; line-height: 1.8; }
</style>
</head>
<body>
<h2>🔊 iOS 音频诊断</h2>

<button style="background:#4a9fd4;" onclick="test1()">测试1：最简单正弦波（直连destination）</button>
<button style="background:#2a7abf;" onclick="test2()">测试2：经过 GainNode</button>
<button style="background:#1a5a9f;" onclick="test3()">测试3：经过完整 masterGain 链</button>
<button style="background:#c04040;" onclick="stopAll()">⏹ 停止</button>

<div class="log" id="log">点击上方按钮开始测试…</div>

<script>
let ctx = null;
let nodes = [];

function log(msg) {
  document.getElementById('log').innerHTML += '<br>' + msg;
}

function stop() {
  nodes.forEach(n => { try { n.stop ? n.stop() : n.disconnect(); } catch(e){} });
  nodes = [];
}

function stopAll() { stop(); log('已停止'); }

function ensureCtx() {
  if (!ctx) {
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    log('AudioContext 创建成功，state: ' + ctx.state);
  }
  if (ctx.state === 'suspended') {
    ctx.resume();
    log('resume() 调用，state: ' + ctx.state);
  }
  return ctx;
}

function test1() {
  stop();
  const c = ensureCtx();
  log('--- 测试1：osc → destination ---');
  const osc = c.createOscillator();
  osc.frequency.value = 440;
  osc.connect(c.destination);
  osc.start();
  nodes.push(osc);
  log('播放中，应该听到 440Hz 嗡嗡声');
}

function test2() {
  stop();
  const c = ensureCtx();
  log('--- 测试2：osc → gain → destination ---');
  const osc = c.createOscillator();
  const g = c.createGain();
  g.gain.value = 0.5;
  osc.frequency.value = 440;
  osc.connect(g);
  g.connect(c.destination);
  osc.start();
  nodes.push(osc);
  log('播放中，gain=0.5');
}

function test3() {
  stop();
  const c = ensureCtx();
  log('--- 测试3：完整链 ---');
  const masterGain = c.createGain();
  masterGain.gain.value = 0.45;
  masterGain.connect(c.destination);

  const pre = c.createGain();
  pre.gain.value = 1.0;
  const comp = c.createDynamicsCompressor();
  const g = c.createGain();
  g.gain.value = 0.65;
  pre.connect(comp); comp.connect(g); g.connect(masterGain);

  const osc = c.createOscillator();
  osc.frequency.value = 440;
  osc.connect(pre);
  osc.start();
  nodes.push(osc);
  log('播放中，完整 masterGain 链');
}
</script>
</body>
</html>
