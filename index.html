<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>圣多纳释放法</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: #bae6fd;
  display: block;
  overflow: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(186,230,253,0.6) 0%, transparent 60%),
    radial-gradient(ellipse at 70% 80%, rgba(147,217,248,0.5) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}
.card {
  position: relative; z-index: 1;
  width: 100vw; height: 100vh;
  background: linear-gradient(170deg, #cff4ff 0%, #bae6fd 45%, #90d8f5 100%);
}

/* App title — no pointer events */
.app-title {
  position: absolute; top: 22px; left: 0; right: 0;
  text-align: center; z-index: 10; pointer-events: none;
}
.app-title h1 {
  font-family: 'ZCOOL XiaoWei', serif; font-size: 13px;
  letter-spacing: 5px; color: rgba(3,105,161,0.55); font-weight: 400;
}
.app-title p { font-size: 8px; letter-spacing: 2.5px; color: rgba(3,105,161,0.32); margin-top: 3px; }

/* SVG fills card — pointer-events: none on SVG itself, only bubbles get events */
.svg-canvas {
  position: absolute; inset: 0; width: 100%; height: 100%;
  overflow: visible;
  z-index: 5;
  pointer-events: none;  /* SVG bg transparent to clicks */
}

/* Question text */
#questionEl {
  position: absolute; left: 0; right: 0;
  text-align: center;
  font-family: 'ZCOOL XiaoWei', serif; font-size: 13px; letter-spacing: 2px;
  color: rgba(3,105,161,0.75); white-space: nowrap;
  z-index: 30;
  opacity: 0;
  pointer-events: none;
  transition: opacity 1.5s ease;
}
#questionEl.visible { opacity: 1; }
#questionEl em { font-style: normal; color: rgba(3,105,161,0.95); font-size: 15px; }

/* Intro text shown on page load */
#introEl {
  position: absolute; left: 0; right: 0;
  text-align: center;
  font-family: 'ZCOOL XiaoWei', serif; font-size: 13px; letter-spacing: 2px; line-height: 1.8;
  color: rgba(3,105,161,0.75);
  z-index: 30;
  pointer-events: none;
  opacity: 1;
  transition: opacity 1s ease;
}
#introEl span { font-size: 11px; color: rgba(3,105,161,0.45); letter-spacing: 1.5px; }
#introEl.hidden { opacity: 0; }

/* Buttons — pointer-events: none when hidden, auto when visible */
.act-btn {
  position: absolute;
  z-index: 30;
  padding: 7px 18px; border-radius: 99px;
  border: 1px solid rgba(255,255,255,0.85);
  background: rgba(255,255,255,0.45); backdrop-filter: blur(12px);
  font-family: 'ZCOOL XiaoWei', serif; font-size: 13px;
  letter-spacing: 2px; color: rgba(3,105,161,0.85);
  cursor: pointer; white-space: nowrap;
  transform: translateY(-50%);
  /* KEY FIX: hidden buttons do NOT intercept clicks */
  opacity: 0;
  pointer-events: none;
  transition: opacity 1.5s ease;
}
.act-btn.visible {
  opacity: 1;
  pointer-events: auto;
}
.act-btn:hover { background: rgba(255,255,255,0.68); }

/* Caption */
.caption {
  position: absolute; bottom: 16px; left: 0; right: 0;
  text-align: center; z-index: 10; pointer-events: none;
}
.caption p { font-size: 7.5px; letter-spacing: 2.5px; color: rgba(3,105,161,0.32); font-family: 'ZCOOL XiaoWei', serif; }

/* Body glow animations */
@keyframes hg1{0%,100%{opacity:0.08}50%{opacity:0.28}}
@keyframes hg2{0%,100%{opacity:0.18}50%{opacity:0.6}}
@keyframes hg3{0%,100%{opacity:0.45}50%{opacity:1}}
@keyframes hcore{0%,100%{opacity:0.55}50%{opacity:1}}
.hg1{animation:hg1 6s ease-in-out infinite;}
.hg2{animation:hg2 5s ease-in-out infinite 0.5s;}
.hg3{animation:hg3 4s ease-in-out infinite 1s;}
.hcore{animation:hcore 4s ease-in-out infinite;}

/* ── 情绪表按钮 ── */
#ecBtn {
  position: fixed; top: 16px; right: 16px; z-index: 100;
  padding: 6px 14px; border-radius: 99px;
  border: 1px solid rgba(255,255,255,0.85);
  background: rgba(255,255,255,0.45); backdrop-filter: blur(12px);
  font-family: 'ZCOOL XiaoWei', serif; font-size: 12px; letter-spacing: 2px;
  color: rgba(3,105,161,0.80); cursor: pointer;
  box-shadow: 0 2px 10px rgba(3,80,140,0.10);
  transition: background 0.2s;
}
#ecBtn:hover { background: rgba(255,255,255,0.68); }

/* ── 情绪表面板 ── */
#ecPanel {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(186,230,253,0.25); backdrop-filter: blur(6px);
  opacity: 0; pointer-events: none;
  transition: opacity 0.32s ease;
  display: flex; align-items: center; justify-content: center;
}
#ecPanel.open { opacity: 1; pointer-events: all; }

.ec-inner {
  display: flex; flex-direction: column;
  width: min(96vw, 900px);
  max-height: 88vh;
  background: linear-gradient(158deg, rgba(222,246,255,0.94) 0%, rgba(186,230,253,0.91) 100%);
  border: 1px solid rgba(255,255,255,0.88); border-radius: 22px;
  box-shadow: 0 10px 40px rgba(3,80,140,0.13), 0 1.5px 0 rgba(255,255,255,0.7) inset;
  overflow: hidden;
  backdrop-filter: blur(20px);
}

.ec-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 20px 10px; flex-shrink: 0;
}
.ec-header-title {
  font-family: 'ZCOOL XiaoWei', serif; font-size: 14px; letter-spacing: 4px;
  color: rgba(3,105,161,0.72);
}
.ec-close {
  width: 28px; height: 28px; border-radius: 50%;
  border: 1px solid rgba(3,105,161,0.18);
  background: rgba(255,255,255,0.45); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s; flex-shrink: 0;
}
.ec-close:hover { background: rgba(255,255,255,0.78); }
.ec-close svg { display: block; }

.ec-scroll {
  flex: 1; overflow-x: auto; overflow-y: auto;
  padding: 0 16px 20px;
}
.ec-table { display: flex; gap: 6px; min-width: max-content; margin: 0 auto; }

.ec-col {
  display: flex; flex-direction: column;
  min-width: 88px;
  border-radius: 14px; overflow: hidden;
  background: rgba(255,255,255,0.28);
  border: 1px solid rgba(255,255,255,0.60);
  flex-shrink: 0;
}
.ec-col-head {
  padding: 8px 6px 6px; text-align: center;
  border-bottom: 1px solid rgba(255,255,255,0.50);
}
.ec-col-head .zh {
  font-family: 'ZCOOL XiaoWei', serif; font-size: 13px; letter-spacing: 1px;
  display: block; font-weight: 600;
}
.ec-col-head .en {
  font-family: 'Noto Serif SC', serif; font-size: 8px; opacity: 0.65;
  display: block; margin-top: 2px;
}
.ec-col-body { padding: 6px 6px 8px; display: flex; flex-direction: column; gap: 1px; }
.ec-col-body span {
  font-family: 'Noto Serif SC', serif; font-size: 9px; line-height: 1.65;
  color: rgba(20,60,90,0.75); text-align: center; display: block;
}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="app-title"><h1>情绪释放</h1><p>SEDONA METHOD</p></div>

  <div id="introEl">深呼吸，放松，充分感受自己的情绪，<br>是下面哪一种？<br><span>（如果不确定可以参考右上角情绪表）</span></div>
  <div id="questionEl"></div>
  <button class="act-btn" id="btnA">允许</button>
  <button class="act-btn" id="btnD">不允许</button>

  <svg class="svg-canvas" id="sv" viewBox="0 0 360 640">
    <defs>
      <filter id="f1" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="10"/></filter>
      <filter id="f2" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="20"/></filter>
      <filter id="f3" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="36"/></filter>
      <filter id="fg" x="-150%" y="-150%" width="400%" height="400%"><feGaussianBlur stdDeviation="14"/></filter>
    </defs>

    <!-- body silhouette: head top y≈143, head center y≈185, neck y≈305, bottom y≈580 -->
    <path class="hg1" d="M330 580 C330 490 320 410 312 372 C303 333 272 323 247 318 C222 313 210 303 210 276 C210 261 210 248 219 239 C241 213 232 143 183 143 C134 143 125 213 147 239 C156 248 156 261 156 276 C156 303 144 313 119 318 C94 323 63 333 54 372 C45 411 36 490 36 580"
      stroke="#fff" stroke-width="80" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#f3)"/>
    <path class="hg2" d="M330 580 C330 490 320 410 312 372 C303 333 272 323 247 318 C222 313 210 303 210 276 C210 261 210 248 219 239 C241 213 232 143 183 143 C134 143 125 213 147 239 C156 248 156 261 156 276 C156 303 144 313 119 318 C94 323 63 333 54 372 C45 411 36 490 36 580"
      stroke="#fff" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#f2)"/>
    <path class="hg3" d="M330 580 C330 490 320 410 312 372 C303 333 272 323 247 318 C222 313 210 303 210 276 C210 261 210 248 219 239 C241 213 232 143 183 143 C134 143 125 213 147 239 C156 248 156 261 156 276 C156 303 144 313 119 318 C94 323 63 333 54 372 C45 411 36 490 36 580"
      stroke="#fff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#f1)"/>
    <path class="hcore" d="M330 580 C330 490 320 410 312 372 C303 333 272 323 247 318 C222 313 210 303 210 276 C210 261 210 248 219 239 C241 213 232 143 183 143 C134 143 125 213 147 239 C156 248 156 261 156 276 C156 303 144 313 119 318 C94 323 63 333 54 372 C45 411 36 490 36 580"
      stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- bubbles group — pointer-events: all so bubbles ARE clickable -->
    <g id="bg" style="pointer-events: all;"></g>
  </svg>

  <div class="caption"><p>SEDONA METHOD · 感受它，允许它，释放它</p></div>
</div>

<button id="ecBtn">情绪表</button>

<div id="ecPanel">
  <div class="ec-inner">
    <div class="ec-header">
      <span class="ec-header-title">情绪表</span>
      <button class="ec-close" id="ecClose"><svg width="10" height="10" viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg"><line x1="1" y1="1" x2="9" y2="9" stroke="rgba(3,105,161,0.55)" stroke-width="1.5" stroke-linecap="round"/><line x1="9" y1="1" x2="1" y2="9" stroke="rgba(3,105,161,0.55)" stroke-width="1.5" stroke-linecap="round"/></svg></button>
    </div>
    <div class="ec-scroll">
      <div class="ec-table" id="ecTable"></div>
    </div>
  </div>
</div>

<script>
const EM = [
  { name:'恐惧',     glow:'#9060d0', stroke:'#c8a8ff', s:['#c8a8ff','#7040b0','#4a2880'] },
  { name:'悲苦',     glow:'#3050b0', stroke:'#a0c0ff', s:['#a0c0ff','#2040a0','#102060'] },
  { name:'万念俱灰', glow:'#304878', stroke:'#b0c8e8', s:['#b0c8e8','#304878','#182840'] },
  { name:'贪求',     glow:'#c06010', stroke:'#ffd0a0', s:['#ffd0a0','#c06010','#803000'] },
  { name:'愤怒',     glow:'#c02020', stroke:'#ffb0b0', s:['#ffb0b0','#c02020','#800000'] },
  { name:'自尊自傲', glow:'#b08000', stroke:'#fff0a0', s:['#fff0a0','#c0900a','#806000'] },
  { name:'无畏',     glow:'#10a090', stroke:'#a0f0e8', s:['#a0f0e8','#10a090','#006060'] },
  { name:'接纳',     glow:'#10a050', stroke:'#a0ffcc', s:['#a0ffcc','#10a050','#006030'] },
  { name:'平和',     glow:'#4ab0e0', stroke:'#ffffff', s:['#ffffff','#c0e8ff','#80c8ff'] },
];

const R = 30, DIAM = R * 2, NS = 'http://www.w3.org/2000/svg';
const COUNT = 1;
const card = document.getElementById('card');
const sv   = document.getElementById('sv');
const bgG  = document.getElementById('bg');
const dfs  = sv.querySelector('defs');
const introEl = document.getElementById('introEl');
const qEl  = document.getElementById('questionEl');
const btnA = document.getElementById('btnA');
const btnD = document.getElementById('btnD');

// Store original grid positions for respawn
const GRID_POSITIONS = [
  { x: 128, y: 382 }, { x: 238, y: 382 },
  { x: 183, y: 420 },
  { x: 128, y: 458 }, { x: 238, y: 458 },
  { x: 183, y: 496 },
  { x: 128, y: 534 }, { x: 238, y: 534 },
  { x: 183, y: 565 },
];
// Map emotionIdx → grid position index (set during init)
const eiToGridIdx = {};

const TARGET_X = 183, TARGET_Y = 185; // head center in viewBox
let gc = 0, bubbles = [], sel = null;

// viewBox → card px
function toPx(sx, sy) {
  return { x: (sx/360)*card.offsetWidth, y: (sy/640)*card.offsetHeight };
}

function positionUI() {
  const {x:bx, y:by} = toPx(TARGET_X, TARGET_Y);
  const Rpx = (R/360)*card.offsetWidth;
  const headTopPx = (143/640)*card.offsetHeight;

  // question above head top — intro uses same position
  const cardH = card.offsetHeight;
  // position text so its bottom edge sits ~20px above head top
  qEl.style.top = '';
  qEl.style.bottom = (cardH - headTopPx + 20) + 'px';
  introEl.style.top = '';
  introEl.style.bottom = (cardH - headTopPx + 20) + 'px';

  // buttons left/right of bubble — 不允许 left, 允许 right
  const gap = Rpx + 38;
  btnD.style.top   = by + 'px';
  btnD.style.right = (card.offsetWidth - bx + gap) + 'px';
  btnD.style.left  = 'auto';
  btnA.style.top   = by + 'px';
  btnA.style.left  = (bx + gap) + 'px';
  btnA.style.right = 'auto';
}

// body x range for bubble centers (already inset by R+margin)
function bodyXRange(y) {
  const M = R + 2;
  let x0, x1;
  if (y < 318)      { x0=163; x1=203; }
  else if (y < 360) { const t=(y-318)/42; x0=163-t*70; x1=203+t*70; }
  else if (y < 440) { const t=(y-360)/80; x0=93+t*20;  x1=273-t*20; }
  else if (y < 500) { const t=(y-440)/60; x0=113-t*8;  x1=253+t*8;  }
  else              { const t=Math.min((y-500)/80,1); x0=105+t*36; x1=261-t*36; }
  return [x0 + M, x1 - M];
}

// Hex stagger: 2 outer cols + 1 center col, alternating rows
// Outer cols x=128, x=238 (spacing=110px > 60 ✓)
// Center col x=183
// Row spacing=76px (same col) > 60 ✓
// Diagonal (outer↔center): sqrt(55²+38²)=65px > 60 ✓
function generatePositions() {
  const grid = [
    { x: 128, y: 382 }, { x: 238, y: 382 },  // row 1 outer
    { x: 183, y: 420 },                         // row 1.5 center
    { x: 128, y: 458 }, { x: 238, y: 458 },  // row 2 outer
    { x: 183, y: 496 },                         // row 2.5 center
    { x: 128, y: 534 }, { x: 238, y: 534 },  // row 3 outer
    { x: 183, y: 565 },                         // row 3.5 center
  ];
  for (let i = grid.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [grid[i], grid[j]] = [grid[j], grid[i]];
  }
  return grid;
}

function mkGrad(s) {
  const id='g'+(gc++);
  const rg=document.createElementNS(NS,'radialGradient');
  rg.setAttribute('id',id); rg.setAttribute('cx','35%'); rg.setAttribute('cy','30%'); rg.setAttribute('r','65%');
  [[s[0],0.55,'0%'],[s[1],0.28,'60%'],[s[2],0.62,'100%']].forEach(([c,o,off])=>{
    const st=document.createElementNS(NS,'stop');
    st.setAttribute('offset',off); st.setAttribute('stop-color',c); st.setAttribute('stop-opacity',o);
    rg.appendChild(st);
  });
  dfs.appendChild(rg); return id;
}

function spawn(ei, si, pos) {
  const e=EM[ei], gid=mkGrad(e.s);
  const g=document.createElementNS(NS,'g');
  g.setAttribute('style','cursor:pointer; pointer-events:all;');

  const glC=document.createElementNS(NS,'circle');
  glC.setAttribute('r', 32); glC.setAttribute('fill',e.glow);
  glC.setAttribute('filter','url(#fg)'); glC.style.opacity='0.3';

  const bod=document.createElementNS(NS,'circle');
  bod.setAttribute('r',R); bod.setAttribute('fill','url(#'+gid+')');

  const rim=document.createElementNS(NS,'circle');
  rim.setAttribute('r',R); rim.setAttribute('fill','none');
  rim.setAttribute('stroke',e.stroke); rim.setAttribute('stroke-width','1'); rim.setAttribute('stroke-opacity','0.8');

  const h1=document.createElementNS(NS,'ellipse');
  h1.setAttribute('rx','6'); h1.setAttribute('ry','3.5'); h1.setAttribute('fill','white');
  h1.setAttribute('fill-opacity','0.32'); h1.setAttribute('transform','translate(-5,-7)');

  const h2=document.createElementNS(NS,'ellipse');
  h2.setAttribute('rx','2.5'); h2.setAttribute('ry','1.5'); h2.setAttribute('fill','white');
  h2.setAttribute('fill-opacity','0.18'); h2.setAttribute('transform','translate(5,-5)');

  const tx=document.createElementNS(NS,'text');
  tx.setAttribute('text-anchor','middle'); tx.setAttribute('dy','0.35em');
  tx.setAttribute('font-size',e.name.length>3?'7.5':'8.5');
  tx.setAttribute('font-family',"'Noto Serif SC',serif");
  tx.setAttribute('fill','white'); tx.setAttribute('fill-opacity','0.92');
  tx.textContent=e.name;

  [glC,bod,rim,h1,h2,tx].forEach(el=>g.appendChild(el));
  bgG.appendChild(g);

  const b={
    ei,si, bx:pos.x, by:pos.y, x:pos.x, y:pos.y,
    ph:Math.random()*Math.PI*2, fa:2+Math.random()*1, fs:6+Math.random()*4,
    gph:Math.random()*Math.PI*2, gs:0.8+Math.random()*0.5,
    state:'idle', op:1, rs:64800, wo:Math.random()*10,
    el:g, gl:glC
  };

  g.addEventListener('click', (e) => {
    e.stopPropagation();
    onClick(b);
  });

  g.setAttribute('transform',`translate(${pos.x},${pos.y})`);
  bubbles.push(b); return b;
}

function init() {
  // Shuffle GRID_POSITIONS indices
  const indices = [0,1,2,3,4,5,6,7,8];
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }
  // Assign each emotion a fixed grid slot
  EM.forEach((_, ei) => {
    const gridIdx = indices[ei];
    eiToGridIdx[ei] = gridIdx;
    spawn(ei, 0, GRID_POSITIONS[gridIdx]);
  });
  positionUI();
}

function onClick(b) {
  if (b.state!=='idle'||sel) return;
  sel=b; b.state='selected';
  introEl.classList.add('hidden');
  qEl.innerHTML=STRINGS_EM[emLang].question.replace('{name}', EM[b.ei].name);
  positionUI();
  qEl.classList.add('visible');
  btnA.classList.add('visible');
  btnD.classList.add('visible');
}

function doRelease(b) {
  b.state = 'releasing'; sel = null;
  qEl.classList.remove('visible');
  btnA.classList.remove('visible');
  btnD.classList.remove('visible');

  const el = b.el;
  const cx = b.x.toFixed(1);
  const cy = b.y.toFixed(1);
  const endY = (b.y - 700).toFixed(1);

  // SMIL animate — browser handles it natively, smooth and fast
  const animT = document.createElementNS(NS, 'animateTransform');
  animT.setAttribute('attributeName', 'transform');
  animT.setAttribute('type', 'translate');
  animT.setAttribute('from', `${cx} ${cy}`);
  animT.setAttribute('to', `${cx} ${endY}`);
  animT.setAttribute('dur', '1.5s');
  animT.setAttribute('fill', 'freeze');

  const animO = document.createElementNS(NS, 'animate');
  animO.setAttribute('attributeName', 'opacity');
  animO.setAttribute('from', '1');
  animO.setAttribute('to', '0');
  animO.setAttribute('dur', '1.5s');
  animO.setAttribute('fill', 'freeze');

  el.appendChild(animT);
  el.appendChild(animO);
  animT.beginElement();
  animO.beginElement();

  setTimeout(() => {
    b.state = 'gone';
    el.remove();
    respawn(b.ei, b.si);
    // Show the loop prompt
    introEl.innerHTML = STRINGS_EM[emLang].loop;
    introEl.classList.remove('hidden');
  }, 1550);
}

btnA.addEventListener('click', ()=>{ if(sel) doRelease(sel); });
btnD.addEventListener('click', ()=>{ if(sel) doRelease(sel); });

function randRespawnPos() {
  const others=bubbles.filter(b=>b.state!=='gone').map(b=>({bx:b.bx,by:b.by}));
  const minD2 = (DIAM + 8) ** 2;
  for(let i=0;i<600;i++){
    const y=328+Math.random()*238;
    const [x0,x1]=bodyXRange(y);
    if(x1-x0<4) continue;
    const x=x0+Math.random()*(x1-x0);
    if(others.every(o=>(o.bx-x)**2+(o.by-y)**2>minD2)) return{x,y};
  }
  return{x:183,y:440};
}

let last=null;
function loop(ts){
  const dt=last?Math.min((ts-last)/1000,0.05):0.016; last=ts;

  bubbles.forEach(b=>{
    if(b.state==='gone' || b.state==='releasing') return;

    if(b.state==='idle'){
      b.ph+=dt*b.fs;
      b.x=b.bx+Math.cos(b.ph*0.65)*1.5;
      b.y=b.by+Math.sin(b.ph)*b.fa;
      b.gph+=dt*b.gs;
      b.gl.style.opacity=((Math.sin(b.gph)*0.5+0.5)*0.85).toFixed(3);

    } else if(b.state==='selected'){
      if (!b._flyStarted) {
        b._flyStarted = true;
        b._flyStartX = b.x;
        b._flyStartY = b.y;
        b._flyT = 0;
        b._flyDur = 0.15; // seconds
      }
      b._flyT = Math.min(b._flyT + dt / b._flyDur, 1);
      // linear
      b.x = b._flyStartX + (TARGET_X - b._flyStartX) * b._flyT;
      b.y = b._flyStartY + (TARGET_Y - b._flyStartY) * b._flyT;
      b.gl.style.opacity = '0.65';

    } else if(b.state==='releasing'){
      // handled by CSS transition in doRelease()
      return;
    }

    b.el.setAttribute('transform',`translate(${b.x.toFixed(1)},${b.y.toFixed(1)})`);
  });
  requestAnimationFrame(loop);
}

function respawn(ei, si) {
  bubbles = bubbles.filter(b => !(b.ei === ei && b.si === si));
  // Always respawn at the same grid position this emotion was assigned
  const gridIdx = eiToGridIdx[ei];
  const pos = GRID_POSITIONS[gridIdx];
  const nb = spawn(ei, 0, pos);
  nb.y = pos.y + 40; nb.el.style.opacity = '0'; nb.op = 0;
  let op = 0;
  const iv = setInterval(() => {
    op = Math.min(1, op + 0.12);
    nb.el.style.opacity = op.toFixed(2);
    if (op >= 1) clearInterval(iv);
  }, 30);
}
