<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>圣多纳释放法</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: #bae6fd;
  display: block;
  overflow: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(186,230,253,0.6) 0%, transparent 60%),
    radial-gradient(ellipse at 70% 80%, rgba(147,217,248,0.5) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}
.card {
  position: relative; z-index: 1;
  width: 100vw; height: 100vh;
  background: linear-gradient(170deg, #cff4ff 0%, #bae6fd 45%, #90d8f5 100%);
}

.app-title {
  position: absolute; top: 22px; left: 0; right: 0;
  text-align: center; z-index: 10; pointer-events: none;
}
.app-title h1 {
  font-family: 'ZCOOL XiaoWei', serif; font-size: 13px;
  letter-spacing: 5px; color: rgba(3,105,161,0.55); font-weight: 400;
}
.app-title p { font-size: 8px; letter-spacing: 2.5px; color: rgba(3,105,161,0.32); margin-top: 3px; }

.svg-canvas {
  position: absolute; inset: 0; width: 100%; height: 100%;
  overflow: visible;
  z-index: 5;
  pointer-events: none;
}

#questionEl {
  position: absolute; left: 0; right: 0;
  text-align: center;
  font-family: 'ZCOOL XiaoWei', serif; font-size: 13px; letter-spacing: 2px;
  color: rgba(3,105,161,0.75); line-height: 1.9;
  z-index: 30;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.6s ease;
}
#questionEl.visible { opacity: 1; }
#questionEl em { font-style: normal; color: rgba(3,105,161,0.95); font-size: 15px; }
#questionEl .hint { font-size: 11px; color: rgba(3,105,161,0.45); letter-spacing: 1.5px; display: block; }

/* Stage label — appears between emotion release and desire phase */
#stageLabel {
  position: absolute; left: 0; right: 0;
  text-align: center;
  font-family: 'ZCOOL XiaoWei', serif; font-size: 11px; letter-spacing: 3px;
  color: rgba(3,105,161,0.55);
  z-index: 30; opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s ease;
}
#stageLabel.visible { opacity: 1; }

.act-btn {
  position: absolute;
  z-index: 30;
  padding: 7px 18px; border-radius: 99px;
  border: 1px solid rgba(255,255,255,0.85);
  background: rgba(255,255,255,0.45); backdrop-filter: blur(12px);
  font-family: 'ZCOOL XiaoWei', serif; font-size: 13px;
  letter-spacing: 2px; color: rgba(3,105,161,0.85);
  cursor: pointer; white-space: nowrap;
  transform: translateY(-50%);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.6s ease;
}
.act-btn.visible {
  opacity: 1;
  pointer-events: auto;
}
.act-btn:hover { background: rgba(255,255,255,0.68); }

.caption {
  position: absolute; bottom: 16px; left: 0; right: 0;
  text-align: center; z-index: 10; pointer-events: none;
}
.caption p { font-size: 7.5px; letter-spacing: 2.5px; color: rgba(3,105,161,0.32); font-family: 'ZCOOL XiaoWei', serif; }

@keyframes hg1{0%,100%{opacity:0.08}50%{opacity:0.28}}
@keyframes hg2{0%,100%{opacity:0.18}50%{opacity:0.6}}
@keyframes hg3{0%,100%{opacity:0.45}50%{opacity:1}}
@keyframes hcore{0%,100%{opacity:0.55}50%{opacity:1}}
.hg1{animation:hg1 6s ease-in-out infinite;}
.hg2{animation:hg2 5s ease-in-out infinite 0.5s;}
.hg3{animation:hg3 4s ease-in-out infinite 1s;}
.hcore{animation:hcore 4s ease-in-out infinite;}

/* Desire bubble pulse ring */
@keyframes desireRing {
  0%   { r: 32; opacity: 0.5; }
  100% { r: 50; opacity: 0; }
}
.desire-ring {
  animation: desireRing 1.8s ease-out infinite;
}

/* ── Emotion table ── */
#ecBtn {
  position: fixed; top: 16px; right: 16px; z-index: 100;
  padding: 7px 16px; border-radius: 99px;
  border: 1px solid rgba(255,255,255,0.85);
  background: rgba(255,255,255,0.45); backdrop-filter: blur(12px);
  font-family: 'ZCOOL XiaoWei', serif; font-size: 13px;
  letter-spacing: 2px; color: rgba(3,105,161,0.85);
  cursor: pointer;
}
#ecPanel {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(186,230,253,0.55); backdrop-filter: blur(18px);
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 24px 16px 16px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.35s ease;
}
#ecPanel.open { opacity: 1; pointer-events: all; }
.ec-header {
  width: 100%; max-width: 500px;
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px; padding: 0 4px;
}
.ec-header-title {
  font-family: 'ZCOOL XiaoWei', serif; font-size: 15px;
  letter-spacing: 4px; color: rgba(3,105,161,0.75);
}
.ec-close {
  width: 30px; height: 30px; border-radius: 50%;
  border: 1px solid rgba(3,105,161,0.25);
  background: rgba(255,255,255,0.5); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
}
.ec-table { display: flex; gap: 6px; min-width: max-content; }
.ec-col { display: flex; flex-direction: column; gap: 5px; min-width: 88px; }
.ec-col-head {
  border-radius: 10px; padding: 8px 6px 6px; text-align: center;
  border: 1px solid rgba(255,255,255,0.6);
}
.ec-col-head .zh {
  font-family: 'ZCOOL XiaoWei', serif; font-size: 12px;
  letter-spacing: 1.5px; display: block;
}
.ec-col-head .en {
  font-size: 7px; letter-spacing: 1px; opacity: 0.55;
  display: block; margin-top: 2px;
}
.ec-item {
  border-radius: 8px; padding: 5px 6px; text-align: center;
  border: 1px solid rgba(255,255,255,0.5);
  font-family: 'ZCOOL XiaoWei', serif; font-size: 11px;
  letter-spacing: 1px; color: rgba(20,60,90,0.75);
  display: block;
}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="app-title"><h1>情绪释放</h1><p>SEDONA METHOD</p></div>

  <button id="ecBtn">情绪表</button>

  <div id="ecPanel">
    <div class="ec-header">
      <span class="ec-header-title">情绪表</span>
      <button class="ec-close" id="ecClose">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
          <line x1="1" y1="1" x2="9" y2="9" stroke="rgba(3,105,161,0.55)" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="9" y1="1" x2="1" y2="9" stroke="rgba(3,105,161,0.55)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="ec-table" id="ecTable"></div>
  </div>

  <div id="questionEl"></div>
  <div id="stageLabel"></div>
  <button class="act-btn" id="btnA">允许</button>
  <button class="act-btn" id="btnD">不允许</button>

  <svg class="svg-canvas" id="sv" viewBox="0 0 360 640">
    <defs>
      <filter id="f1" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="10"/></filter>
      <filter id="f2" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="20"/></filter>
      <filter id="f3" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="36"/></filter>
      <filter id="fg" x="-150%" y="-150%" width="400%" height="400%"><feGaussianBlur stdDeviation="14"/></filter>
      <filter id="fd" x="-150%" y="-150%" width="400%" height="400%"><feGaussianBlur stdDeviation="16"/></filter>
    </defs>

    <path class="hg1" d="M330 580 C330 490 320 410 312 372 C303 333 272 323 247 318 C222 313 210 303 210 276 C210 261 210 248 219 239 C241 213 232 143 183 143 C134 143 125 213 147 239 C156 248 156 261 156 276 C156 303 144 313 119 318 C94 323 63 333 54 372 C45 411 36 490 36 580"
      stroke="#fff" stroke-width="80" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#f3)"/>
    <path class="hg2" d="M330 580 C330 490 320 410 312 372 C303 333 272 323 247 318 C222 313 210 303 210 276 C210 261 210 248 219 239 C241 213 232 143 183 143 C134 143 125 213 147 239 C156 248 156 261 156 276 C156 303 144 313 119 318 C94 323 63 333 54 372 C45 411 36 490 36 580"
      stroke="#fff" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#f2)"/>
    <path class="hg3" d="M330 580 C330 490 320 410 312 372 C303 333 272 323 247 318 C222 313 210 303 210 276 C210 261 210 248 219 239 C241 213 232 143 183 143 C134 143 125 213 147 239 C156 248 156 261 156 276 C156 303 144 313 119 318 C94 323 63 333 54 372 C45 411 36 490 36 580"
      stroke="#fff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#f1)"/>
    <path class="hcore" d="M330 580 C330 490 320 410 312 372 C303 333 272 323 247 318 C222 313 210 303 210 276 C210 261 210 248 219 239 C241 213 232 143 183 143 C134 143 125 213 147 239 C156 248 156 261 156 276 C156 303 144 313 119 318 C94 323 63 333 54 372 C45 411 36 490 36 580"
      stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <g id="bg" style="pointer-events: all;"></g>
  </svg>

  <div class="caption"><p>SEDONA METHOD · 感受它，允许它，释放它</p></div>
</div>

<script>
/* ── Emotion definitions ─────────────────────────────────────────────── */
const EM = [
  { name:'恐惧',     glow:'#9060d0', stroke:'#c8a8ff', s:['#c8a8ff','#7040b0','#4a2880'] },
  { name:'悲苦',     glow:'#3050b0', stroke:'#a0c0ff', s:['#a0c0ff','#2040a0','#102060'] },
  { name:'万念俱灰', glow:'#304878', stroke:'#b0c8e8', s:['#b0c8e8','#304878','#182840'] },
  { name:'贪求',     glow:'#c06010', stroke:'#ffd0a0', s:['#ffd0a0','#c06010','#803000'] },
  { name:'愤怒',     glow:'#c02020', stroke:'#ffb0b0', s:['#ffb0b0','#c02020','#800000'] },
  { name:'自尊自傲', glow:'#b08000', stroke:'#fff0a0', s:['#fff0a0','#c0900a','#806000'] },
  { name:'无畏',     glow:'#10a090', stroke:'#a0f0e8', s:['#a0f0e8','#10a090','#006060'] },
  { name:'接纳',     glow:'#10a050', stroke:'#a0ffcc', s:['#a0ffcc','#10a050','#006030'] },
  { name:'平和',     glow:'#4ab0e0', stroke:'#ffffff', s:['#ffffff','#c0e8ff','#80c8ff'] },
];

/* ── Desire definitions (three desires) ────────────────────────────────
   Warm amber-rose palette to visually distinguish from emotion bubbles  */
const DESIRES = [
  {
    name: '想要控制',
    glow: '#b84040',
    stroke: '#ffcca0',
    s: ['#ffcca0','#c05030','#7a2010'],
    /* three body positions: chest-left, chest-right, belly-center */
    bodyPos: { x: 123, y: 370 }
  },
  {
    name: '想要被认同',
    glow: '#9050b0',
    stroke: '#e0b8ff',
    s: ['#e0b8ff','#9050b0','#5a1880'],
    bodyPos: { x: 243, y: 370 }
  },
  {
    name: '想要安全',
    glow: '#2080a0',
    stroke: '#a0e0ff',
    s: ['#a0e0ff','#2080a0','#0a4860'],
    bodyPos: { x: 183, y: 455 }
  },
];

/* ── Constants ──────────────────────────────────────────────────────── */
const R = 30, NS = 'http://www.w3.org/2000/svg';
const TARGET_X = 183, TARGET_Y = 185;

const card  = document.getElementById('card');
const sv    = document.getElementById('sv');
const bgG   = document.getElementById('bg');
const dfs   = sv.querySelector('defs');
const qEl   = document.getElementById('questionEl');
const sLbl  = document.getElementById('stageLabel');
const btnA  = document.getElementById('btnA');
const btnD  = document.getElementById('btnD');

const GRID_POSITIONS = [
  { x:128, y:382 }, { x:238, y:382 },
  { x:183, y:420 },
  { x:128, y:458 }, { x:238, y:458 },
  { x:183, y:496 },
  { x:128, y:534 }, { x:238, y:534 },
  { x:183, y:565 },
];
const eiToGridIdx = {};

let gc = 0, bubbles = [], desireBubbles = [], sel = null;
/* phase: 'emotion' | 'desire_select' | 'desire_merged' */
let phase = 'emotion';
let desireSelected = [];   // desire bubbles currently selected/flying to head
let mergedBubble = null;   // the big merged SVG group at head
let mergedR = 30;          // radius of current merged bubble

/* ── Helpers ────────────────────────────────────────────────────────── */
function toPx(sx, sy) {
  return { x:(sx/360)*card.offsetWidth, y:(sy/640)*card.offsetHeight };
}

function positionUI() {
  const {x:bx, y:by} = toPx(TARGET_X, TARGET_Y);
  const curR = (phase === 'desire_merged') ? mergedR : R;
  const Rpx = (curR/360)*card.offsetWidth;
  const headTopPx = (143/640)*card.offsetHeight;
  const cardH = card.offsetHeight;
  qEl.style.top = '';
  qEl.style.bottom = (cardH - headTopPx + 20) + 'px';
  sLbl.style.top = (headTopPx - 22) + 'px';
  const gap = Rpx + 38;
  btnD.style.top   = by + 'px';
  btnD.style.right = (card.offsetWidth - bx + gap) + 'px';
  btnD.style.left  = 'auto';
  btnA.style.top   = by + 'px';
  btnA.style.left  = (bx + gap) + 'px';
  btnA.style.right = 'auto';
}

function mkGrad(s) {
  const id = 'g'+(gc++);
  const rg = document.createElementNS(NS,'radialGradient');
  rg.setAttribute('id',id); rg.setAttribute('cx','35%'); rg.setAttribute('cy','30%'); rg.setAttribute('r','65%');
  [[s[0],0.55,'0%'],[s[1],0.28,'60%'],[s[2],0.62,'100%']].forEach(([c,o,off])=>{
    const st = document.createElementNS(NS,'stop');
    st.setAttribute('offset',off); st.setAttribute('stop-color',c); st.setAttribute('stop-opacity',o);
    rg.appendChild(st);
  });
  dfs.appendChild(rg); return id;
}

/* ── Spawn an emotion bubble ─────────────────────────────────────────── */
function spawn(ei, si, pos) {
  const e = EM[ei], gid = mkGrad(e.s);
  const g = document.createElementNS(NS,'g');
  g.setAttribute('style','cursor:pointer; pointer-events:all;');

  const glC = document.createElementNS(NS,'circle');
  glC.setAttribute('r',32); glC.setAttribute('fill',e.glow);
  glC.setAttribute('filter','url(#fg)'); glC.style.opacity='0.3';

  const bod = document.createElementNS(NS,'circle');
  bod.setAttribute('r',R); bod.setAttribute('fill','url(#'+gid+')');

  const rim = document.createElementNS(NS,'circle');
  rim.setAttribute('r',R); rim.setAttribute('fill','none');
  rim.setAttribute('stroke',e.stroke); rim.setAttribute('stroke-width','1'); rim.setAttribute('stroke-opacity','0.8');

  const h1 = document.createElementNS(NS,'ellipse');
  h1.setAttribute('rx','6'); h1.setAttribute('ry','3.5'); h1.setAttribute('fill','white');
  h1.setAttribute('fill-opacity','0.32'); h1.setAttribute('transform','translate(-5,-7)');

  const h2 = document.createElementNS(NS,'ellipse');
  h2.setAttribute('rx','2.5'); h2.setAttribute('ry','1.5'); h2.setAttribute('fill','white');
  h2.setAttribute('fill-opacity','0.18'); h2.setAttribute('transform','translate(5,-5)');

  const tx = document.createElementNS(NS,'text');
  tx.setAttribute('text-anchor','middle'); tx.setAttribute('dy','0.35em');
  tx.setAttribute('font-size', e.name.length>3?'7.5':'8.5');
  tx.setAttribute('font-family',"'Noto Serif SC',serif");
  tx.setAttribute('fill','white'); tx.setAttribute('fill-opacity','0.92');
  tx.textContent = e.name;

  [glC,bod,rim,h1,h2,tx].forEach(el=>g.appendChild(el));
  bgG.appendChild(g);

  const b = {
    kind:'emotion', ei, si,
    bx:pos.x, by:pos.y, x:pos.x, y:pos.y,
    ph:Math.random()*Math.PI*2, fa:2+Math.random()*1, fs:6+Math.random()*4,
    gph:Math.random()*Math.PI*2, gs:0.8+Math.random()*0.5,
    state:'idle', op:1, gl:glC, el:g
  };

  g.addEventListener('click', (ev) => { ev.stopPropagation(); onClick(b); });
  g.setAttribute('transform',`translate(${pos.x},${pos.y})`);
  bubbles.push(b); return b;
}

/* ── Spawn a desire bubble ───────────────────────────────────────────── */
function spawnDesire(di, pos) {
  const d = DESIRES[di], gid = mkGrad(d.s);
  const g = document.createElementNS(NS,'g');
  g.setAttribute('style','cursor:pointer; pointer-events:all;');

  /* pulsing outer ring */
  const ring = document.createElementNS(NS,'circle');
  ring.setAttribute('r','44'); ring.setAttribute('fill','none');
  ring.setAttribute('stroke', d.stroke); ring.setAttribute('stroke-width','1.2');
  ring.setAttribute('stroke-opacity','0.5');
  ring.classList.add('desire-ring');
  /* stagger ring animation */
  ring.style.animationDelay = (di * 0.6) + 's';

  const glC = document.createElementNS(NS,'circle');
  glC.setAttribute('r','46'); glC.setAttribute('fill',d.glow);
  glC.setAttribute('filter','url(#fd)'); glC.style.opacity='0.35';

  const bod = document.createElementNS(NS,'circle');
  bod.setAttribute('r',40); bod.setAttribute('fill','url(#'+gid+')');

  const rim = document.createElementNS(NS,'circle');
  rim.setAttribute('r',40); rim.setAttribute('fill','none');
  rim.setAttribute('stroke',d.stroke); rim.setAttribute('stroke-width','1.4'); rim.setAttribute('stroke-opacity','0.9');

  /* inner sparkle dots */
  [-10,10].forEach(dx => {
    const dot = document.createElementNS(NS,'circle');
    dot.setAttribute('r','2'); dot.setAttribute('cx', dx); dot.setAttribute('cy','-8');
    dot.setAttribute('fill','white'); dot.setAttribute('fill-opacity','0.35');
    g.appendChild(dot);
  });

  const h1 = document.createElementNS(NS,'ellipse');
  h1.setAttribute('rx','12'); h1.setAttribute('ry','6'); h1.setAttribute('fill','white');
  h1.setAttribute('fill-opacity','0.28'); h1.setAttribute('transform','translate(-10,-13)');

  const tx = document.createElementNS(NS,'text');
  tx.setAttribute('text-anchor','middle'); tx.setAttribute('dy','0.35em');
  tx.setAttribute('font-size','9'); tx.setAttribute('font-family',"'Noto Serif SC',serif");
  tx.setAttribute('fill','white'); tx.setAttribute('fill-opacity','0.92');
  tx.textContent = d.name;

  [ring, glC, bod, rim, h1, tx].forEach(el=>g.appendChild(el));
  bgG.appendChild(g);

  const b = {
    kind:'desire', di,
    bx:pos.x, by:pos.y, x:pos.x, y:pos.y,
    ph:Math.random()*Math.PI*2, fa:2.5+Math.random()*1.5, fs:5+Math.random()*3,
    gph:Math.random()*Math.PI*2, gs:1.0+Math.random()*0.6,
    state:'idle', op:1, gl:glC, el:g
  };

  g.addEventListener('click', (ev) => { ev.stopPropagation(); onClickDesire(b); });
  g.setAttribute('transform',`translate(${pos.x},${pos.y})`);
  desireBubbles.push(b); return b;
}

/* ── UI interactions ─────────────────────────────────────────────────── */
function onClick(b) {
  if (phase !== 'emotion') return;
  if (b.state !== 'idle' || sel) return;
  sel = b; b.state = 'selected';
  /* Intro question replaced by emotion-specific question */
  qEl.innerHTML = `你能允许这份 <em>${EM[b.ei].name}</em> 的感受离开吗？`;
  positionUI();
  qEl.classList.add('visible');
  btnA.classList.add('visible');
  btnD.classList.add('visible');
}

function onClickDesire(b) {
  if (phase !== 'desire_select') return;
  if (b.state !== 'idle') return;
  if (_arrivedNames.length + desireSelected.length >= 3) return;

  /* Hide bridging question on first selection */
  if (desireSelected.length === 0 && _arrivedNames.length === 0) {
    qEl.classList.remove('visible');
  }

  b.state = 'selected';
  desireSelected.push(b);
  const name = DESIRES[b.di].name;

  /* Fly duration matches _flyDur (0.25s) */
  const FLY_MS = 270;
  setTimeout(() => {
    b.state = 'gone';
    b.el.remove();
    desireBubbles = desireBubbles.filter(db => db !== b);
    desireSelected = desireSelected.filter(db => db !== b);
    refreshMergedBubble(name);
  }, FLY_MS);
}

/* ── Release animation (shared) ─────────────────────────────────────── */
function releaseAnim(b, onDone) {
  b.state = 'releasing'; sel = null;
  qEl.classList.remove('visible');
  btnA.classList.remove('visible');
  btnD.classList.remove('visible');

  const el = b.el;
  const cx = b.x.toFixed(1), cy = b.y.toFixed(1);
  const endY = (b.y - 700).toFixed(1);

  const animT = document.createElementNS(NS,'animateTransform');
  animT.setAttribute('attributeName','transform');
  animT.setAttribute('type','translate');
  animT.setAttribute('from',`${cx} ${cy}`);
  animT.setAttribute('to',`${cx} ${endY}`);
  animT.setAttribute('dur','0.9s');
  animT.setAttribute('fill','freeze');

  const animO = document.createElementNS(NS,'animate');
  animO.setAttribute('attributeName','opacity');
  animO.setAttribute('from','1');
  animO.setAttribute('to','0');
  animO.setAttribute('dur','0.9s');
  animO.setAttribute('fill','freeze');

  el.appendChild(animT); el.appendChild(animO);
  animT.beginElement(); animO.beginElement();

  setTimeout(() => {
    b.state = 'gone';
    el.remove();
    if (onDone) onDone();
  }, 950);
}

/* ── Fade helpers ────────────────────────────────────────────────────── */
function fadeBubbles(list, toOpacity, onAllDone) {
  if (list.length === 0) { if (onAllDone) onAllDone(); return; }
  let done = 0;
  list.forEach(b => {
    if (b.state === 'gone') { done++; if (done === list.length && onAllDone) onAllDone(); return; }
    let op = parseFloat(b.el.style.opacity) || 1;
    const step = toOpacity > op ? 0.12 : -0.12;
    const iv = setInterval(() => {
      op = toOpacity > (parseFloat(b.el.style.opacity)||1)
        ? Math.min(toOpacity, op + Math.abs(step))
        : Math.max(toOpacity, op - Math.abs(step));
      b.el.style.opacity = op.toFixed(2);
      if (Math.abs(op - toOpacity) < 0.01) {
        clearInterval(iv);
        b.el.style.opacity = toOpacity.toFixed(2);
        done++;
        if (done === list.length && onAllDone) onAllDone();
      }
    }, 25);
  });
}

/* ── Emotion release → show question → desire phase ─────────────────── */
function doRelease(b) {
  releaseAnim(b, () => {
    /* Respawn this emotion bubble (hidden, ready for later) */
    respawn(b.ei, b.si);

    /* Fade out ALL emotion bubbles, then enter desire phase */
    const visible = bubbles.filter(eb => eb.state !== 'gone');
    fadeBubbles(visible, 0, () => {
      bubbles.forEach(eb => { if (eb.el) eb.el.style.pointerEvents = 'none'; });
      triggerDesirePhase();
    });
  });
}

/* ── Desire phase ────────────────────────────────────────────────────── */
function triggerDesirePhase() {
  phase = 'desire_select';
  desireBubbles = [];
  desireSelected = [];
  mergedBubble = null;
  _arrivedNames = [];

  /* Show bridging question — stays until first desire bubble clicked */
  positionUI();
  qEl.innerHTML = `这背后是<em>什么想要</em>？`;
  qEl.classList.add('visible');

  /* Spawn all 3 desire bubbles with staggered entrance */
  DESIRES.forEach((d, di) => {
    setTimeout(() => {
      const nb = spawnDesire(di, d.bodyPos);
      nb.el.style.opacity = '0';
      let op = 0;
      const iv = setInterval(() => {
        op = Math.min(1, op + 0.08);
        nb.el.style.opacity = op.toFixed(2);
        if (op >= 1) clearInterval(iv);
      }, 30);
    }, di * 320);
  });
}

/* Track names of desire bubbles that have merged at head */
let _arrivedNames = [];

/* Called each time a desire bubble arrives at head */
function refreshMergedBubble(name) {
  _arrivedNames.push(name);

  /* Remove old merged bubble silently */
  if (mergedBubble) {
    mergedBubble.el.remove();
    mergedBubble = null;
  }

  /* Spawn updated merged bubble (larger if more names) */
  spawnMerged([..._arrivedNames]);
}

function spawnMerged(names) {
  const MR = names.length === 1 ? 40 : names.length === 2 ? 48 : 56; // size by count
  mergedR = MR;
  const gid = 'mg' + (gc++);
  const rg = document.createElementNS(NS, 'radialGradient');
  rg.setAttribute('id', gid); rg.setAttribute('cx','38%'); rg.setAttribute('cy','32%'); rg.setAttribute('r','65%');
  // Merged bubble: warm moss-gold — distinct from red, purple, blue-teal
  [['#fef3c0',0.65,'0%'],['#c8a820',0.42,'55%'],['#7a6000',0.72,'100%']].forEach(([c,o,off]) => {
    const st = document.createElementNS(NS,'stop');
    st.setAttribute('offset',off); st.setAttribute('stop-color',c); st.setAttribute('stop-opacity',o);
    rg.appendChild(st);
  });
  dfs.appendChild(rg);

  const g = document.createElementNS(NS,'g');
  g.setAttribute('style','pointer-events:all; cursor:pointer;');

  const glC = document.createElementNS(NS,'circle');
  glC.setAttribute('r','65'); glC.setAttribute('fill','#c0980a');
  glC.setAttribute('filter','url(#fd)'); glC.style.opacity='0.45';

  const bod = document.createElementNS(NS,'circle');
  bod.setAttribute('r', MR); bod.setAttribute('fill','url(#'+gid+')');

  const rim = document.createElementNS(NS,'circle');
  rim.setAttribute('r', MR); rim.setAttribute('fill','none');
  rim.setAttribute('stroke','#fde68a'); rim.setAttribute('stroke-width','1.5'); rim.setAttribute('stroke-opacity','0.9');

  const h1 = document.createElementNS(NS,'ellipse');
  h1.setAttribute('rx','12'); h1.setAttribute('ry','6'); h1.setAttribute('fill','white');
  h1.setAttribute('fill-opacity','0.28'); h1.setAttribute('transform','translate(-10,-13)');

  /* Text: show each name on its own line or combined */
  const label = names.join('·');
  const tx = document.createElementNS(NS,'text');
  tx.setAttribute('text-anchor','middle'); tx.setAttribute('dy','0.35em');
  tx.setAttribute('font-size', names.length === 3 ? '7.5' : names.length === 2 ? '8' : '9');
  tx.setAttribute('font-family',"'Noto Serif SC',serif");
  tx.setAttribute('fill','white'); tx.setAttribute('fill-opacity','0.95');
  tx.textContent = label;

  [glC, bod, rim, h1, tx].forEach(el => g.appendChild(el));
  bgG.appendChild(g);
  g.setAttribute('transform', `translate(${TARGET_X},${TARGET_Y})`);

  /* Show immediately (no fade-in delay blocking further clicks) */
  g.style.opacity = '1';

  /* Show question + buttons right away */
  qEl.innerHTML = `能允许这些<em>想要</em>离开吗？`;
  positionUI();
  qEl.classList.add('visible');
  btnA.classList.add('visible');
  btnD.classList.add('visible');

  mergedBubble = { el: g, glC, x: TARGET_X, y: TARGET_Y, state: 'idle' };
}

function doReleaseMerged() {
  if (!mergedBubble || mergedBubble.state !== 'idle') return;
  phase = 'desire_merged'; // lock out further desire clicks
  mergedBubble.state = 'releasing';

  qEl.classList.remove('visible');
  btnA.classList.remove('visible');
  btnD.classList.remove('visible');

  const el = mergedBubble.el;
  const cx = TARGET_X, cy = TARGET_Y;
  const endY = cy - 700;

  const animT = document.createElementNS(NS,'animateTransform');
  animT.setAttribute('attributeName','transform'); animT.setAttribute('type','translate');
  animT.setAttribute('from',`${cx} ${cy}`); animT.setAttribute('to',`${cx} ${endY}`);
  animT.setAttribute('dur','0.9s'); animT.setAttribute('fill','freeze');

  const animO = document.createElementNS(NS,'animate');
  animO.setAttribute('attributeName','opacity');
  animO.setAttribute('from','1'); animO.setAttribute('to','0');
  animO.setAttribute('dur','0.9s'); animO.setAttribute('fill','freeze');

  el.appendChild(animT); el.appendChild(animO);
  animT.beginElement(); animO.beginElement();

  setTimeout(() => {
    el.remove();
    mergedBubble = null;
    returnToEmotionPhase();
  }, 950);
}

function returnToEmotionPhase() {
  /* Fade out and remove all remaining (unselected) desire bubbles */
  const dVisible = desireBubbles.filter(db => db.state !== 'gone');
  fadeBubbles(dVisible, 0, () => {
    dVisible.forEach(db => { db.state = 'gone'; db.el.remove(); });
    desireBubbles = [];

    /* Fade emotion bubbles back in and re-enable clicks */
    bubbles.forEach(eb => { if (eb.el) eb.el.style.pointerEvents = 'all'; });
    const eVisible = bubbles.filter(eb => eb.state !== 'gone');
    fadeBubbles(eVisible, 1, () => {
      /* Restore intro question */
      positionUI();
      qEl.innerHTML = `再次感受，现在是什么<em>情绪</em>？`;
      qEl.classList.add('visible');
    });
  });

  phase = 'emotion';
}

/* ── Button handlers ─────────────────────────────────────────────────── */
btnA.addEventListener('click', () => {
  if (phase === 'emotion' && sel) doRelease(sel);
  else if ((phase === 'desire_select' || phase === 'desire_merged') && mergedBubble) doReleaseMerged();
});
btnD.addEventListener('click', () => {
  if (phase === 'emotion' && sel) doRelease(sel);
  else if ((phase === 'desire_select' || phase === 'desire_merged') && mergedBubble) doReleaseMerged();
});

/* ── Emotion respawn ─────────────────────────────────────────────────── */
function respawn(ei, si) {
  bubbles = bubbles.filter(b => !(b.ei === ei && b.si === si));
  const gridIdx = eiToGridIdx[ei];
  const pos = GRID_POSITIONS[gridIdx];
  const nb = spawn(ei, 0, pos);
  nb.y = pos.y + 40;
  /* Always spawn hidden and non-interactive; returnToEmotionPhase fades them in */
  nb.el.style.opacity = '0';
  nb.el.style.pointerEvents = 'none';
}

/* ── Init ────────────────────────────────────────────────────────────── */
function init() {
  const indices = [0,1,2,3,4,5,6,7,8];
  for (let i = indices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }
  EM.forEach((_, ei) => {
    const gridIdx = indices[ei];
    eiToGridIdx[ei] = gridIdx;
    spawn(ei, 0, GRID_POSITIONS[gridIdx]);
  });
}

/* ── Animation loop ──────────────────────────────────────────────────── */
let last = null;
function loop(ts) {
  const dt = last ? Math.min((ts-last)/1000, 0.05) : 0.016; last = ts;

  /* emotion bubbles */
  bubbles.forEach(b => {
    if (b.state==='gone' || b.state==='releasing') return;
    if (b.state==='idle') {
      b.ph += dt * b.fs;
      b.x = b.bx + Math.cos(b.ph*0.65)*1.5;
      b.y = b.by + Math.sin(b.ph)*b.fa;
      b.gph += dt * b.gs;
      b.gl.style.opacity = ((Math.sin(b.gph)*0.5+0.5)*0.85).toFixed(3);
    } else if (b.state==='selected') {
      if (!b._flyStarted) {
        b._flyStarted=true; b._flyStartX=b.x; b._flyStartY=b.y;
        b._flyT=0; b._flyDur=0.2;
      }
      b._flyT = Math.min(b._flyT + dt/b._flyDur, 1);
      b.x = b._flyStartX + (TARGET_X - b._flyStartX)*b._flyT;
      b.y = b._flyStartY + (TARGET_Y - b._flyStartY)*b._flyT;
      b.gl.style.opacity = '0.65';
    }
    b.el.setAttribute('transform',`translate(${b.x.toFixed(1)},${b.y.toFixed(1)})`);
  });

  /* desire bubbles */
  desireBubbles.forEach(b => {
    if (b.state==='gone' || b.state==='releasing') return;
    if (b.state==='idle') {
      b.ph += dt * b.fs;
      b.x = b.bx + Math.cos(b.ph*0.7)*2;
      b.y = b.by + Math.sin(b.ph)*b.fa;
      b.gph += dt * b.gs;
      b.gl.style.opacity = ((Math.sin(b.gph)*0.5+0.5)*0.90).toFixed(3);
    } else if (b.state==='selected') {
      if (!b._flyStarted) {
        b._flyStarted=true; b._flyStartX=b.x; b._flyStartY=b.y;
        b._flyT=0; b._flyDur=0.25;
      }
      b._flyT = Math.min(b._flyT + dt/b._flyDur, 1);
      b.x = b._flyStartX + (TARGET_X - b._flyStartX)*b._flyT;
      b.y = b._flyStartY + (TARGET_Y - b._flyStartY)*b._flyT;
      /* Fade out as it arrives — keeps original color, no shrink distortion */
      b.el.style.opacity = (1 - b._flyT).toFixed(3);
    }
    b.el.setAttribute('transform',`translate(${b.x.toFixed(1)},${b.y.toFixed(1)})`);
  });

  /* merged bubble glow pulse */
  if (mergedBubble && mergedBubble.state === 'idle') {
    mergedBubble._gph = (mergedBubble._gph || 0) + dt * 1.2;
    mergedBubble.glC.style.opacity = ((Math.sin(mergedBubble._gph)*0.5+0.5)*0.6+0.3).toFixed(3);
  }

  requestAnimationFrame(loop);
}

let pageLang = 'zh';
function applyPageLang(lang) {
  pageLang = lang;
  var L = STRINGS_PAGE[lang];
  var h1 = document.querySelector('.app-title h1');
  if (h1) h1.textContent = L.title;
  var p = document.querySelector('.app-title p');
  if (p) p.textContent = L.subtitle;
  var btnA = document.getElementById('btnA');
  if (btnA) btnA.textContent = L.allow;
  var btnD = document.getElementById('btnD');
  if (btnD) btnD.textContent = L.deny;
  var ecBtn = document.getElementById('ecBtn');
  if (ecBtn) ecBtn.textContent = L.ec_title;
  rebuildEcTable(lang);
}
function rebuildEcTable(lang) {
  var table = document.getElementById('ecTable');
  if (!table) return;
  table.innerHTML = '';
  var L = STRINGS_PAGE[lang];
  var COLS = [
    { key: 'high', color: 'rgba(74,176,224,0.8)', bg: 'rgba(74,176,224,0.18)', items: ['平和','接纳','无畏'] },
    { key: 'mid',  color: 'rgba(120,80,0,0.8)',   bg: 'rgba(176,128,0,0.15)',  items: ['自尊自傲','贪求','愤怒'] },
    { key: 'low',  color: 'rgba(30,50,120,0.8)',  bg: 'rgba(60,80,130,0.15)', items: ['悲苦','恐惧','万念俱灰'] },
  ];
  COLS.forEach(function(col) {
    var colEl = document.createElement('div');
    colEl.className = 'ec-col';
    var head = document.createElement('div');
    head.className = 'ec-col-head';
    head.style.background = col.bg;
    head.innerHTML = '<span class="zh" style="color:' + col.color + '">' + L[col.key] + '</span>';
    colEl.appendChild(head);
    col.items.forEach(function(zhKey) {
      var item = document.createElement('div');
      item.className = 'ec-item';
      item.style.background = col.bg;
      item.textContent = lang === 'zh' ? zhKey : (EMOTION_DATA[zhKey] ? EMOTION_DATA[zhKey].en : zhKey);
      colEl.appendChild(item);
    });
    table.appendChild(colEl);
  });
}
document.addEventListener('fr-lang-change', function(e) {
  applyPageLang(e.detail);
});
applyPageLang(localStorage.getItem('fr-lang') || 'zh');
